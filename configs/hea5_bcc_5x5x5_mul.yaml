# Equiatomic quinary bcc 5x5x5 (250 sites) with the v1.9 multiplet sectors:
# the hea5_bcc_5x5x5 production config + triplets to the second zone and
# quadruplets to the disphenoid cutoff (SPEC 4.2). Used by the sector
# benchmark campaigns; seed kept at the campaign value.
lattice:    {type: bcc, a: 3.165}
supercell:  {diag: [5, 5, 5]}
composition: {W: 0.2, Cr: 0.2, Ta: 0.2, Fe: 0.2, Pb: 0.2}
zones:      {n_shells: 7, shell_tol: 1.0e-3}
error:
  weights: {form: inv_n}
  mode: auto
  gamma: 0.0
  multiplets: {lambda3: 1.0, lambda4: 0.0, shell3: 2, shell4: 2}
evolution:
  population: 250
  outputs: 5
  e_tol: 1.0e-9
  max_generations: 100000
  survival: {mode: ratio}
  mutation: {swaps: poisson, lambda: 1.0, symmetry_preserving: true, retry_budget: 100}
  seeding:  {mode: mixed, sg_pool: auto}
parallel:   {islands: 4, omp_threads: auto, migration_every: 50, migrants: 2}
rng:        {seed: 20260704}
output:     {dir: ./runs/hea5_mul, checkpoint_every: 200, log_level: info}
