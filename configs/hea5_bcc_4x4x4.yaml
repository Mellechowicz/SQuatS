# 5-component equiatomic refractory HEA (MoNbTaVW class) on bcc 4x4x4
# (-> Mo26Nb26Ta26V25W25, 128 sites). First K=5 system: mode auto ->
# full_pairs [A16], 15 pair types. E_floor = 8.0379e-2 (probe 2026-07-04):
# large and NONZERO -- the K=3 dyadic zero-floor phenomenon does not recur.
# e_tol 0.10 ~ 1.24 x E_floor (auto would be 3x = 0.241).
lattice:    {type: bcc, a: 3.2}
supercell:  {diag: [4, 4, 4]}
composition: {Mo: 0.2, Nb: 0.2, Ta: 0.2, V: 0.2, W: 0.2}
zones:      {n_shells: 5, shell_tol: 1.0e-3}
error:
  weights:  {form: inv_n}
  mode:     auto
  gamma:    0.0
evolution:
  population: 100
  outputs: 6
  e_tol: 0.10
  max_generations: 60
  survival: {mode: ratio}
  elitism_best: 1
  p1_elite_quota: 0
  mutation: {swaps: 1, symmetry_preserving: true, retry_budget: 100}
  seeding:  {mode: mixed, sg_pool: auto}
  stagnation_stop: 25
symmetry:   {symprec: 1.0e-5, filter: {policy: reject_p1}}
displacements: {convention: phonopy_default}
parallel:   {islands: 4, omp_threads: auto, migration_every: 8, migrants: 2}
rng:        {seed: 20260704}
output:     {dir: ./runs/hea5_g0, formats: [poscar], checkpoint_every: 20, log_level: info}
