# 5-component equiatomic refractory HEA (MoNbTaVW) on bcc 5x5x5
# (-> Mo50Nb50Ta50V50W50, 250 sites; composition EXACTLY commensurate x=1/5).
# Probe 2026-07-04: E_floor = 0 EXACTLY (all quantization targets integral) --
# the zero-floor phenomenon recurs at K=5 when the cell divides the
# composition. e_tol is therefore numeric (SPEC 4.1); campaigns here are
# budget-limited by design. Dedup group |Pi| = 12000 perms.
lattice:    {type: bcc, a: 3.2}
supercell:  {diag: [5, 5, 5]}
composition: {Mo: 0.2, Nb: 0.2, Ta: 0.2, V: 0.2, W: 0.2}
zones:      {n_shells: 5, shell_tol: 1.0e-3}
error:
  weights:  {form: inv_n}
  mode:     auto
  gamma:    0.0
evolution:
  population: 100
  outputs: 6
  e_tol: 1.0e-3
  max_generations: 60
  survival: {mode: ratio}
  elitism_best: 1
  p1_elite_quota: 0
  mutation: {swaps: 1, symmetry_preserving: true, retry_budget: 100}
  seeding:  {mode: mixed, sg_pool: auto}
  stagnation_stop: 25
symmetry:   {symprec: 1.0e-5, filter: {policy: reject_p1}}
displacements: {convention: phonopy_default}
parallel:   {islands: 4, omp_threads: auto, migration_every: 8, migrants: 2}
rng:        {seed: 20260704}
output:     {dir: ./runs/hea5x5_g0, formats: [poscar], checkpoint_every: 20, log_level: info}
